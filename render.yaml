services:
  - type: web
    runtime: node
    name: datasetverse
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    numInstances: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
