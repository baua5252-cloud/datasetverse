services:
  - type: web
    runtime: docker
    name: datasetverse
    plan: free
    region: oregon
    numInstances: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
